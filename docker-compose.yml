services:
  pt-media-hub:
    build:
      context: .
      dockerfile: Dockerfile
    image: pt-media-hub:0.1.0-mvp
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////data/pt_media_hub.db
      STATIC_DIR: /app/static
      TMDB_MODE: ${TMDB_MODE:-direct}
      TMDB_GATEWAY_URL: ${TMDB_GATEWAY_URL:-}
      TMDB_GATEWAY_KEY: ${TMDB_GATEWAY_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
