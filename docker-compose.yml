services:
  pt-media-hub:
    build:
      context: .
      dockerfile: Dockerfile
    image: pt-media-hub:1.0.0
    environment:
      APP_RUNTIME_PROFILE: nas
      APP_DATA_DIR: /data
      DATABASE_URL: sqlite:////data/pt_media_hub.db
      ENVIRONMENT: production
      STATIC_DIR: /app/static
      APP_RUNTIME_SECRETS_FILE: /data/runtime-secrets.json
      # APP_TIMEZONE controls backend/AI fallbacks; TZ keeps the container OS aligned.
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Shanghai}
      TZ: ${APP_TIMEZONE:-Asia/Shanghai}
    extra_hosts:
      # Optional hostname users may enter for a proxy published by the NAS host.
      # The proxy address and port are configured only in the Media Hub UI.
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      # Replace the left side with real NAS folders. Keep /mnt/storage1~3 unchanged.
      # The app scans these fixed container paths and deduplicates capacity by storage pool.
      # Examples:
      #   /volume1/qb1-downloads:/mnt/storage1:ro
      #   /volume1/qb2-downloads:/mnt/storage2:ro
      #   /volume1/qb3-downloads:/mnt/storage3:ro
      - ${MEDIA_HUB_STORAGE_1:-./data}:/mnt/storage1:ro
      - ${MEDIA_HUB_STORAGE_2:-./data}:/mnt/storage2:ro
      - ${MEDIA_HUB_STORAGE_3:-./data}:/mnt/storage3:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
